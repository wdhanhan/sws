version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sws
      POSTGRES_PASSWORD: sws_secret
      POSTGRES_DB: starfall_warsong
    ports:
      - "15432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      SERVER_MODE: debug
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: sws
      DB_PASSWORD: sws_secret
      DB_NAME: starfall_warsong
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: starfall-warsong-production-secret
    depends_on:
      - postgres
      - redis

